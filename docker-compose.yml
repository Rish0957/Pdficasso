version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdficasso-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pdficasso-frontend
    ports:
      - "5173:80" # Map host's 5173 to Nginx's default 80
    depends_on:
      - backend
    restart: unless-stopped
