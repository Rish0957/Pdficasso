services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: pdficasso-jenkins
    ports:
      - "8080:8080"     # Jenkins Web UI
      - "50000:50000"   # Attached agent ports
    volumes:
      - jenkins_data:/var/jenkins_home
      # CRITICAL: This allows the Jenkins container to command the Docker Desktop engine on your PC!
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_data:
